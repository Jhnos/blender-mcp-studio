name: blender-mcp
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - mcp
    - anthropic
    - openai
    - httpx
    - pydantic>=2.0
    - pyyaml
    - python-dotenv
    - fastapi
    - uvicorn[standard]
    - websockets
    - pytest
    - pytest-asyncio
    - pytest-cov
    - ruff
    - mypy
