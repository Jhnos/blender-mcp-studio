blender_api_notes: |
  ## Blender 5.x API (bpy) Key Patterns

  ### Object Creation
  ```python
  import bpy
  # Add mesh primitives:
  bpy.ops.mesh.primitive_cube_add(location=(0, 0, 0), scale=(1, 1, 1))
  bpy.ops.mesh.primitive_uv_sphere_add(radius=1, location=(0, 0, 0))
  bpy.ops.mesh.primitive_cylinder_add(radius=0.5, depth=2, location=(0, 0, 0))
  bpy.ops.mesh.primitive_torus_add(major_radius=1, minor_radius=0.3)
  bpy.ops.mesh.primitive_cone_add(radius1=1, depth=2)
  obj = bpy.context.active_object  # get newly created object
  obj.name = "MyObject"
  ```

  ### Materials (Blender 5.x — use type check, not node name)
  ```python
  mat = bpy.data.materials.new(name="MyMaterial")
  mat.use_nodes = True
  nodes = mat.node_tree.nodes
  # IMPORTANT: In Blender 5.x, DO NOT use nodes["Principled BSDF"] — KeyError!
  # Use type check instead:
  bsdf = next((n for n in nodes if n.type == 'BSDF_PRINCIPLED'), None)
  if bsdf:
      bsdf.inputs['Base Color'].default_value = (1.0, 0.2, 0.2, 1.0)  # RGBA
      bsdf.inputs['Metallic'].default_value = 0.0
      bsdf.inputs['Roughness'].default_value = 0.5
  obj.data.materials.append(mat)
  ```

  ### Object Modification
  ```python
  obj = bpy.data.objects.get("ObjectName")  # None if not found
  if obj:
      obj.location = (1.0, 2.0, 0.5)
      obj.scale = (2.0, 2.0, 2.0)
      obj.rotation_euler = (0, 0, 1.5708)  # radians
  ```

  ### Delete Object
  ```python
  obj = bpy.data.objects.get("ObjectName")
  if obj:
      bpy.data.objects.remove(obj, do_unlink=True)
  ```

  ### Scene Information
  ```python
  scene = bpy.context.scene
  for obj in scene.objects:
      print(obj.name, obj.type, obj.location)
  ```

  ### Common Mistakes to Avoid
  - Never use `bpy.ops.object.delete()` without first selecting the object
  - Always check `obj is not None` before accessing properties
  - Use `obj.data.materials.clear()` before adding a new material to replace existing
  - For rotations, always use radians (multiply degrees by math.pi / 180)
  - `bpy.context.active_object` may be None if nothing is selected

tool_instructions: |
  ## Available Tools
  - **create_object**: Create mesh, light, camera, or curve objects
  - **delete_object**: Remove an object by name
  - **modify_object**: Change location, rotation, scale, or visibility
  - **apply_material**: Create and assign PBR materials (color, metallic, roughness)
  - **get_scene_info**: List all objects in the current scene
  - **execute_code**: Run arbitrary bpy Python for complex operations not covered by other tools

  ## Strategy
  1. Prefer structured tools (create_object, apply_material) over execute_code when possible
  2. Use execute_code only for complex operations (geometry nodes, animations, modifiers)
  3. For materials, always use apply_material tool (it handles Blender 5.x node API correctly)
  4. Check scene info first if the user asks about existing objects
