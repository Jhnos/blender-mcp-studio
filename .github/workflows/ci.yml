name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests api

      - name: Format check with ruff
        run: ruff format --check src tests api

      - name: Type check with mypy
        run: mypy src api --ignore-missing-imports --no-error-summary
        continue-on-error: true  # warn only until we reach 100% coverage

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short --no-header \
            -p no:warnings \
            --cov=src --cov=api \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false
